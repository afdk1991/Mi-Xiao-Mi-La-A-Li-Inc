<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 - 亿级商城</title>
  <meta name="description" content="亿级商城用户登录">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .auth-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .auth-title {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
      font-weight: bold;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 30px;
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }
    .auth-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #667eea;
    }
    .code-input-group {
      display: flex;
      gap: 10px;
    }
    .code-input-group .form-input {
      flex: 1;
    }
    .code-btn {
      padding: 12px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.3s;
    }
    .code-btn:hover {
      background: #5568d3;
    }
    .code-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
    }
    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }
    .auth-divider span {
      padding: 0 15px;
      color: #999;
    }
    .third-party-btns {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .third-party-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      color: white;
      transition: transform 0.3s;
    }
    .third-party-btn:hover {
      transform: scale(1.1);
    }
    .third-party-btn.wechat { background: #07c160; }
    .third-party-btn.qq { background: #12b7f5; }
    .third-party-btn.weibo { background: #e6162d; }
    .third-party-btn.alipay { background: #1677ff; }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .auth-footer a {
      color: #667eea;
      text-decoration: none;
    }
    .error-msg {
      background: #fee;
      border: 1px solid #fcc;
      color: #c00;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .back-home {
      text-align: center;
      margin-top: 20px;
    }
    .back-home a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <h1 class="auth-title">用户登录</h1>
      
      <div id="errorMsg" class="error-msg"></div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="account">账号密码</div>
        <div class="auth-tab" data-tab="phone">手机登录</div>
        <div class="auth-tab" data-tab="email">邮箱登录</div>
      </div>

      <!-- 账号密码登录 -->
      <form id="accountForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" class="form-input" name="account" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-submit">登录</button>
      </form>

      <!-- 手机验证码登录 -->
      <form id="phoneForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="tel" class="form-input" name="phone" placeholder="请输入手机号" pattern="^1[3-9]\d{9}$" required>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="code-input-group">
            <input type="text" class="form-input" name="code" placeholder="请输入验证码" required>
            <button type="button" class="code-btn" id="phoneCodeBtn">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">登录</button>
      </form>

      <!-- 邮箱验证码登录 -->
      <form id="emailForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" name="email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="code-input-group">
            <input type="text" class="form-input" name="code" placeholder="请输入验证码" required>
            <button type="button" class="code-btn" id="emailCodeBtn">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">登录</button>
      </form>

      <div class="auth-divider">
        <span>其他登录方式</span>
      </div>

      <div class="third-party-btns">
        <button class="third-party-btn wechat" data-platform="wechat" title="微信登录">W</button>
        <button class="third-party-btn qq" data-platform="qq" title="QQ登录">Q</button>
        <button class="third-party-btn weibo" data-platform="weibo" title="微博登录">V</button>
        <button class="third-party-btn alipay" data-platform="alipay" title="支付宝登录">A</button>
      </div>

      <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <div class="back-home">
    <a href="index.html">← 返回首页</a>
  </div>

  <script>
    const API_BASE = '/api';

    // Tab切换
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.dataset.tab + 'Form').classList.add('active');
      });
    });

    // 显示错误信息
    function showError(msg) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      setTimeout(() => errorDiv.classList.remove('show'), 3000);
    }

    // 发送验证码
    let codeCountdown = 0;
    function startCodeCountdown(btnId) {
      codeCountdown = 60;
      const btn = document.getElementById(btnId);
      const timer = setInterval(() => {
        codeCountdown--;
        btn.textContent = codeCountdown > 0 ? codeCountdown + 's' : '获取验证码';
        btn.disabled = codeCountdown > 0;
        if (codeCountdown <= 0) clearInterval(timer);
      }, 1000);
    }

    async function sendCode(type) {
      let data;
      if (type === 'phone') {
        const phone = document.querySelector('#phoneForm input[name="phone"]').value;
        if (!phone) { showError('请先输入手机号'); return; }
        data = { phone };
      } else {
        const email = document.querySelector('#emailForm input[name="email"]').value;
        if (!email) { showError('请先输入邮箱'); return; }
        data = { email };
      }

      try {
        const res = await fetch(API_BASE + '/auth/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          alert(json.data.message || '验证码已发送');
          startCodeCountdown(type === 'phone' ? 'phoneCodeBtn' : 'emailCodeBtn');
        } else {
          showError(json.msg || '发送验证码失败');
        }
      } catch (error) {
        showError('网络错误');
      }
    }

    document.getElementById('phoneCodeBtn').addEventListener('click', () => sendCode('phone'));
    document.getElementById('emailCodeBtn').addEventListener('click', () => sendCode('email'));

    // 账号登录
    document.getElementById('accountForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        account: formData.get('account'),
        password: formData.get('password'),
        loginType: 'account'
      };

      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          localStorage.setItem('token', json.data.token);
          localStorage.setItem('userId', json.data.userInfo.userId);
          localStorage.setItem('userInfo', JSON.stringify(json.data.userInfo));
          localStorage.setItem('loginType', json.data.loginType);
          alert('登录成功！');
          window.location.href = '01-前端集群/web-vue-pc/index.html';
        } else {
          showError(json.msg || '登录失败');
        }
      } catch (error) {
        showError('网络错误');
      }
    });

    // 手机登录
    document.getElementById('phoneForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        phone: formData.get('phone'),
        verifyCode: formData.get('code'),
        loginType: 'phone'
      };

      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          localStorage.setItem('token', json.data.token);
          localStorage.setItem('userId', json.data.userInfo.userId);
          localStorage.setItem('userInfo', JSON.stringify(json.data.userInfo));
          localStorage.setItem('loginType', json.data.loginType);
          alert('登录成功！');
          window.location.href = '01-前端集群/web-vue-pc/index.html';
        } else {
          showError(json.msg || '登录失败');
        }
      } catch (error) {
        showError('网络错误');
      }
    });

    // 邮箱登录
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        verifyCode: formData.get('code'),
        loginType: 'email'
      };

      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          localStorage.setItem('token', json.data.token);
          localStorage.setItem('userId', json.data.userInfo.userId);
          localStorage.setItem('userInfo', JSON.stringify(json.data.userInfo));
          localStorage.setItem('loginType', json.data.loginType);
          alert('登录成功！');
          window.location.href = '01-前端集群/web-vue-pc/index.html';
        } else {
          showError(json.msg || '登录失败');
        }
      } catch (error) {
        showError('网络错误');
      }
    });

    // 第三方登录
    document.querySelectorAll('.third-party-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        const platform = this.dataset.platform;
        const mockOpenId = platform + '_' + Date.now();
        const mockNickname = platform + '用户';

        try {
          const res = await fetch(API_BASE + '/auth/third-party-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              platform,
              openId: mockOpenId,
              nickname: mockNickname
            })
          });
          const json = await res.json();
          if (json.success) {
            localStorage.setItem('token', json.data.token);
            localStorage.setItem('userId', json.data.userInfo.userId);
            localStorage.setItem('userInfo', JSON.stringify(json.data.userInfo));
            localStorage.setItem('loginType', json.data.loginType);
            if (json.data.isNewUser) {
              alert('欢迎新用户！');
            }
            alert('登录成功！');
            window.location.href = '01-前端集群/web-vue-pc/index.html';
          } else {
            showError(json.msg || '第三方登录失败');
          }
        } catch (error) {
          showError('网络错误');
        }
      });
    });
  </script>
</body>
</html>

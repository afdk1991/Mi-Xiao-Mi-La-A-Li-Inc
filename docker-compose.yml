services:
  # ============================================
  # 数据库服务
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mixmlaal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mixmlaal}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./04-数据库层/mixmlaal-mysql-sql/:/docker-entrypoint-initdb.d/
    networks:
      - mixmlaal-network
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mixmlaal-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mixmlaal-network
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 后端服务
  # ============================================
  node-api:
    build:
      context: ./02-后端微服务集群/mixmlaal-node-api
      dockerfile: Dockerfile
    container_name: mixmlaal-node-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mixmlaal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    networks:
      - mixmlaal-network
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # 前端服务
  # ============================================
  pc-frontend:
    image: nginx:alpine
    container_name: mixmlaal-pc-frontend
    volumes:
      - ./01-前端集群/mixmlaal-web-vue-pc/dist:/usr/share/nginx/html:ro
      - ./01-前端集群/mixmlaal-web-vue-pc/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mixmlaal-network
    ports:
      - "3090:8080"
    restart: unless-stopped

  react-admin:
    image: nginx:alpine
    container_name: mixmlaal-react-admin
    networks:
      - mixmlaal-network
    ports:
      - "3002:3000"
    restart: unless-stopped

  driver-app:
    image: nginx:alpine
    container_name: mixmlaal-driver-app
    networks:
      - mixmlaal-network
    ports:
      - "3003:80"
    restart: unless-stopped

  merchant-admin:
    image: nginx:alpine
    container_name: mixmlaal-merchant-admin
    networks:
      - mixmlaal-network
    ports:
      - "3004:80"
    restart: unless-stopped

  h5-mobile:
    image: nginx:alpine
    container_name: mixmlaal-h5-mobile
    networks:
      - mixmlaal-network
    ports:
      - "3005:80"
    restart: unless-stopped

  # ============================================
  # 静态资源服务
  # ============================================
  static-server:
    image: nginx:alpine
    container_name: mixmlaal-static-server
    volumes:
      - ./07-公共资源:/usr/share/nginx/html/public:ro
    networks:
      - mixmlaal-network
    ports:
      - "3010:80"
    restart: unless-stopped

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: mixmlaal-nginx
    volumes:
      - ./05-部署运维层/mixmlaal-nginx-config/mixmlaal-conf-d/laal.top-complete.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - mixmlaal-network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pc-frontend
      - driver-app
      - merchant-admin
      - h5-mobile
      - react-admin
      - node-api
      - static-server
    restart: unless-stopped

  # ============================================
  # SSL 证书自动续期 (Certbot Sidecar)
  # ============================================
  # SSL 证书续期使用主机 crontab:
  # 0 0,12 * * * certbot renew --quiet --deploy-hook "docker kill --signal=SIGHUP mixmlaal-nginx"
    networks:
      - mixmlaal-network
    restart: unless-stopped

  # ============================================
  # 监控服务
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mixmlaal-prometheus
    volumes:
      - ./05-部署运维层/mixmlaal-monitoring/mixmlaal-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mixmlaal-network
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mixmlaal-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - mixmlaal-network
    ports:
      - "3007:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  mixmlaal-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:

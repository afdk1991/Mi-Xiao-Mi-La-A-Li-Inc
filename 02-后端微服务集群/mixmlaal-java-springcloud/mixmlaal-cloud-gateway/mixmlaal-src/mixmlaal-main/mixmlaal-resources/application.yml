server:
  port: 8888

spring:
  application:
    name: gateway-server
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      routes:
        - id: user-server
          uri: lb://user-server
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: shop-server
          uri: lb://shop-server
          predicates:
            - Path=/api/shop/**
          filters:
            - StripPrefix=1
        - id: order-server
          uri: lb://order-server
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        - id: system-server
          uri: lb://system-server
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1

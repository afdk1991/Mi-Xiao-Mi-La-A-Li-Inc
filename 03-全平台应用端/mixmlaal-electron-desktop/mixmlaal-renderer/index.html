<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* https://*">
  <title>亿级商城桌面版</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 登录页面 -->
    <div class="auth-page" id="loginPage">
      <div class="auth-container">
        <div class="auth-header">
          <h1>亿级商城</h1>
          <p>欢迎登录桌面版</p>
        </div>

        <div class="auth-tabs">
          <div class="tab-item active" data-tab="account">账号登录</div>
          <div class="tab-item" data-tab="phone">手机登录</div>
          <div class="tab-item" data-tab="email">邮箱登录</div>
        </div>

        <div class="error-msg" id="loginError"></div>

        <form class="auth-form" id="loginForm">
          <div class="form-group" id="accountGroup">
            <label>账号</label>
            <input type="text" name="account" placeholder="请输入账号" required>
          </div>
          <div class="form-group" id="passwordGroup">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
          </div>

          <div class="form-group phone-group" id="phoneGroup" style="display:none;">
            <label>手机号</label>
            <input type="tel" name="phone" placeholder="请输入手机号" pattern="^1[3-9]\d{9}$">
          </div>
          <div class="form-group phone-group" id="codeGroup1" style="display:none;">
            <label>验证码</label>
            <div class="code-input-group">
              <input type="text" name="code" placeholder="请输入验证码" maxlength="6">
              <button type="button" class="code-btn" id="phoneCodeBtn">获取验证码</button>
            </div>
          </div>

          <div class="form-group email-group" id="emailGroup" style="display:none;">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="请输入邮箱">
          </div>
          <div class="form-group email-group" id="codeGroup2" style="display:none;">
            <label>验证码</label>
            <div class="code-input-group">
              <input type="text" name="emailCode" placeholder="请输入验证码" maxlength="6">
              <button type="button" class="code-btn" id="emailCodeBtn">获取验证码</button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember"> 记住密码
            </label>
            <a href="#" class="forgot-link" id="forgotPassword">忘记密码？</a>
          </div>

          <button type="submit" class="submit-btn" id="loginBtn">登录</button>
        </form>

        <div class="auth-divider">
          <span>其他登录方式</span>
        </div>

        <div class="third-party-btns">
          <button class="third-party-btn wechat" data-platform="wechat" title="微信登录">
            <span class="btn-icon">微</span>
          </button>
          <button class="third-party-btn qq" data-platform="qq" title="QQ登录">
            <span class="btn-icon">Q</span>
          </button>
          <button class="third-party-btn weibo" data-platform="weibo" title="微博登录">
            <span class="btn-icon">微</span>
          </button>
          <button class="third-party-btn alipay" data-platform="alipay" title="支付宝登录">
            <span class="btn-icon">支</span>
          </button>
        </div>

        <div class="auth-footer">
          还没有账号？<a href="#" id="goRegister">立即注册</a>
        </div>
      </div>
    </div>

    <!-- 注册页面 -->
    <div class="auth-page" id="registerPage" style="display:none;">
      <div class="auth-container">
        <div class="auth-header">
          <h1>亿级商城</h1>
          <p>用户注册</p>
        </div>

        <div class="auth-tabs">
          <div class="tab-item active" data-tab="account">账号注册</div>
          <div class="tab-item" data-tab="phone">手机注册</div>
          <div class="tab-item" data-tab="email">邮箱注册</div>
        </div>

        <div class="error-msg" id="registerError"></div>

        <form class="auth-form" id="registerForm">
          <div class="form-group account-group" id="regAccountGroup">
            <label>账号</label>
            <input type="text" name="account" placeholder="请输入账号" required>
          </div>
          <div class="form-group account-group" id="regNicknameGroup">
            <label>昵称</label>
            <input type="text" name="nickname" placeholder="请输入昵称" required>
          </div>
          <div class="form-group account-group" id="regPasswordGroup">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
          </div>
          <div class="form-group account-group" id="regConfirmGroup">
            <label>确认密码</label>
            <input type="password" name="confirmPassword" placeholder="请再次输入密码" required>
          </div>

          <div class="form-group phone-group" id="regPhoneGroup" style="display:none;">
            <label>手机号</label>
            <input type="tel" name="phone" placeholder="请输入手机号" pattern="^1[3-9]\d{9}$">
          </div>
          <div class="form-group phone-group" id="regCodeGroup" style="display:none;">
            <label>验证码</label>
            <div class="code-input-group">
              <input type="text" name="code" placeholder="请输入验证码" maxlength="6">
              <button type="button" class="code-btn" id="regPhoneCodeBtn">获取验证码</button>
            </div>
          </div>

          <div class="form-group email-group" id="regEmailGroup" style="display:none;">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="请输入邮箱">
          </div>
          <div class="form-group email-group" id="regEmailCodeGroup" style="display:none;">
            <label>验证码</label>
            <div class="code-input-group">
              <input type="text" name="emailCode" placeholder="请输入验证码" maxlength="6">
              <button type="button" class="code-btn" id="regEmailCodeBtn">获取验证码</button>
            </div>
          </div>

          <div class="form-group">
            <label class="agreement-label">
              <input type="checkbox" name="agree" id="agreeCheckbox"> 我已阅读并同意<a href="#">《用户协议》</a>
            </label>
          </div>

          <button type="submit" class="submit-btn" id="registerBtn">注册</button>
        </form>

        <div class="auth-footer">
          已有账号？<a href="#" id="goLogin">立即登录</a>
        </div>
      </div>
    </div>

    <!-- 主应用页面 -->
    <div class="main-page" id="mainPage" style="display:none;">
      <div class="main-header">
        <div class="header-left">
          <h2>亿级商城</h2>
        </div>
        <div class="header-center">
          <input type="text" class="search-input" placeholder="搜索商品...">
        </div>
        <div class="header-right">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn">退出</button>
        </div>
      </div>
      <div class="main-content">
        <div class="main-sidebar">
          <ul class="nav-menu">
            <li class="nav-item active"><a href="#">首页</a></li>
            <li class="nav-item"><a href="#">商品</a></li>
            <li class="nav-item"><a href="#">订单</a></li>
            <li class="nav-item"><a href="#">购物车</a></li>
            <li class="nav-item"><a href="#">个人中心</a></li>
          </ul>
        </div>
        <div class="main-body">
          <div class="welcome-section">
            <h3>欢迎使用亿级商城桌面版</h3>
            <p id="welcomeText">您已成功登录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 成功注册弹窗 -->
  <div class="modal" id="successModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>注册成功</h3>
      </div>
      <div class="modal-body">
        <p>您的用户ID：<span id="newUserId"></span></p>
        <p class="tip">请牢记您的用户ID</p>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="modalOkBtn">确定</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

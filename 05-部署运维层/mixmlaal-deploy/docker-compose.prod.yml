version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yiji-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: user_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../04-数据库层/mysql-sql:/docker-entrypoint-initdb.d
    networks:
      - yiji-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yiji-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - yiji-network
    restart: unless-stopped

  vue-frontend:
    image: node:18-alpine
    container_name: yiji-vue-frontend
    working_dir: /app
    volumes:
      - ../01-前端集群/web-vue-pc:/app
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run build && npx serve -s dist -l 8080"
    networks:
      - yiji-network
    depends_on:
      - python-fastapi
      - node-gateway
    restart: unless-stopped

  react-admin:
    image: node:18-alpine
    container_name: yiji-react-admin
    working_dir: /app
    volumes:
      - ../01-前端集群/web-react-admin:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npx serve -s dist -l 3000"
    networks:
      - yiji-network
    depends_on:
      - python-fastapi
      - node-gateway
    restart: unless-stopped

  python-fastapi:
    image: python:3.11-slim
    container_name: yiji-python-fastapi
    working_dir: /app
    volumes:
      - ../02-后端微服务集群/python-fastapi:/app
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python main.py"
    networks:
      - yiji-network
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  node-gateway:
    image: node:18-alpine
    container_name: yiji-node-gateway
    working_dir: /app
    volumes:
      - ../02-后端微服务集群/node-nest-gateway:/app
    ports:
      - "8002:8002"
    command: sh -c "npm install && npm run build && npm start"
    networks:
      - yiji-network
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: yiji-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../05-部署运维层/nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - yiji-network
    depends_on:
      - vue-frontend
      - react-admin
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  yiji-network:
    driver: bridge

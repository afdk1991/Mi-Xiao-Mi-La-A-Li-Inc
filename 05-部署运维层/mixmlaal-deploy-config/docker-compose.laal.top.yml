# ============================================
# laal.top 完整项目部署配置
# ============================================
version: '3.8'

services:

  # ============================================
  # 数据库服务
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mixmlaal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mixmlaal}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../04-数据库层/mixmlaal-mysql-sql/:/docker-entrypoint-initdb.d/
    networks:
      - mixmlaal-network
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mixmlaal-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456}
    volumes:
      - redis-data:/data
    networks:
      - mixmlaal-network
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 后端服务
  # ============================================
  node-api:
    build:
      context: ../../02-后端微服务集群/mixmlaal-node-api
      dockerfile: Dockerfile
    container_name: mixmlaal-node-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mixmlaal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      JWT_SECRET: ${JWT_SECRET:-mixmlaal-super-secret-jwt-key-change-this}
    volumes:
      - ./logs/node-api:/app/logs
    networks:
      - mixmlaal-network
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # 前端服务
  # ============================================
  pc-frontend:
    build:
      context: ../../01-前端集群/mixmlaal-web-vue-pc
      dockerfile: Dockerfile
    container_name: mixmlaal-pc-frontend
    environment:
      VITE_API_BASE_URL: https://laal.top/api/v1
    networks:
      - mixmlaal-network
    ports:
      - "3000:80"
    restart: unless-stopped

  driver-app:
    build:
      context: ../../01-前端集群/mixmlaal-web-driver-vue
      dockerfile: Dockerfile
    container_name: mixmlaal-driver-app
    environment:
      VITE_API_BASE_URL: https://laal.top/api/v1
    networks:
      - mixmlaal-network
    ports:
      - "3003:80"
    restart: unless-stopped

  merchant-admin:
    build:
      context: ../../01-前端集群/mixmlaal-web-merchant-vue
      dockerfile: Dockerfile
    container_name: mixmlaal-merchant-admin
    environment:
      VITE_API_BASE_URL: https://laal.top/api/v1
    networks:
      - mixmlaal-network
    ports:
      - "3004:80"
    restart: unless-stopped

  h5-mobile:
    build:
      context: ../../01-前端集群/mixmlaal-web-h5-mobile
      dockerfile: Dockerfile
    container_name: mixmlaal-h5-mobile
    environment:
      VITE_API_BASE_URL: https://laal.top/api/v1
    networks:
      - mixmlaal-network
    ports:
      - "3005:80"
    restart: unless-stopped

  react-admin:
    build:
      context: ../../01-前端集群/mixmlaal-web-react-admin
      dockerfile: Dockerfile
    container_name: mixmlaal-react-admin
    environment:
      VITE_API_BASE_URL: https://laal.top/api/v1
    networks:
      - mixmlaal-network
    ports:
      - "3002:80"
    restart: unless-stopped

  ruoyi-admin:
    build:
      context: ../../01-前端集群/mixmlaal-web-ruoyi-vue
      dockerfile: Dockerfile
    container_name: mixmlaal-ruoyi-admin
    networks:
      - mixmlaal-network
    ports:
      - "3006:80"
    restart: unless-stopped

  # ============================================
  # 静态资源服务
  # ============================================
  static-server:
    image: nginx:alpine
    container_name: mixmlaal-static-server
    volumes:
      - ./static-assets:/usr/share/nginx/html
      - ../../07-公共资源:/usr/share/nginx/html/public
    networks:
      - mixmlaal-network
    ports:
      - "3010:80"
    restart: unless-stopped

  # ============================================
  # Nginx 反向代理 - laal.top
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: mixmlaal-nginx
    volumes:
      - ../mixmlaal-nginx-config/mixmlaal-conf-d/laal.top.conf:/etc/nginx/conf.d/default.conf
      - ../mixmlaal-nginx-config/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    networks:
      - mixmlaal-network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pc-frontend
      - driver-app
      - merchant-admin
      - h5-mobile
      - react-admin
      - ruoyi-admin
      - node-api
      - static-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 监控服务
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mixmlaal-prometheus
    volumes:
      - ../mixmlaal-monitoring/mixmlaal-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - mixmlaal-network
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mixmlaal-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - ../mixmlaal-monitoring/mixmlaal-grafana/mixmlaal-provisioning:/etc/grafana/provisioning
      - ../mixmlaal-monitoring/mixmlaal-grafana/mixmlaal-dashboards:/etc/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - mixmlaal-network
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  mixmlaal-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:

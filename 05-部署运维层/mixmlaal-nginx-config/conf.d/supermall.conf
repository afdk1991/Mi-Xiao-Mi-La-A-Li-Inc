# ============================================
# MIXMLAAL 虚拟主机配置
# 域名: laal.top | admin.laal.top | api.laal.top
# ============================================

# ============================================
# 1. Vue3 前端 (laal.top, www.laal.top)
# ============================================
server {
    listen 80;
    server_name laal.top www.laal.top;

    # 访问日志
    access_log /var/log/nginx/frontend-access.log main;
    error_log /var/log/nginx/frontend-error.log warn;

    # 静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA 路由处理（Vue Router history模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================
# 2. React 管理后台 (admin.laal.top)
# ============================================
server {
    listen 3000;
    server_name admin.laal.top;

    # 访问日志
    access_log /var/log/nginx/admin-access.log main;
    error_log /var/log/nginx/admin-error.log warn;

    # 静态文件根目录
    root /usr/share/nginx/admin;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA 路由处理（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================
# 3. Node.js 后端 API (api.laal.top)
# ============================================
server {
    listen 3001;
    server_name api.laal.top;

    # 访问日志
    access_log /var/log/nginx/api-access.log main;
    error_log /var/log/nginx/api-error.log warn;

    # API 限流
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://supermall-network:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 登录接口限流
    location /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://supermall-network:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# 亿级商用超级平台 - Nginx完整配置
# 包含负载均衡、反向代理、缓存、Gzip压缩等商用配置

# 运行用户
user nginx;

# 工作进程数（建议设置为CPU核心数）
worker_processes auto;

# 错误日志
error_log /var/log/nginx/error.log warn;

# PID文件
pid /var/run/nginx.pid;

events {
    # 每个工作进程的最大连接数
    worker_connections 10240;

    # 使用epoll多路复用
    use epoll;

    # 允许跨域请求
    add_header Access-Control-Allow-Origin * always;

    # 打开工作模式
    accept_mutex on;

    # 防止多核下惊群问题
    accept_mutex_delay 500ms;
}

http {
    # 引入MIME类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';

    # 访问日志
    access_log /var/log/nginx/access.log main;

    # 高并发优化配置
    # 开启高效文件传输模式
    sendfile on;

    # 减少网络报文段的数量
    tcp_nopush on;
    tcp_nodelay on;

    # 保持连接超时时间（秒）
    keepalive_timeout 65;

    # 请求体大小限制
    client_max_body_size 100m;

    # 开启Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 隐藏Nginx版本号
    server_tokens off;

    # 打开CPU绑定
    worker_cpu_affinity auto;

    # ============ 上游服务器配置 ============
    upstream vue_frontend {
        server vue-pc:8080;
        keepalive 32;
    }

    upstream react_admin {
        server react-admin:3000;
        keepalive 32;
    }

    upstream node_backend {
        server node-backend:3001;
        keepalive 64;
    }

    upstream python_api {
        server python-api:8001;
        keepalive 64;
    }

    upstream nest_gateway {
        server nest-gateway:8002;
        keepalive 64;
    }

    upstream nacos_server {
        server nacos:8848;
        keepalive 32;
    }

    # ============ Vue3 PC前台配置 ============
    server {
        listen 80;
        server_name yijimall.com www.yijimall.com;

        # 前端静态资源
        location / {
            proxy_pass http://vue_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓存配置
            proxy_cache_valid 200 302 1d;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API代理 - Node后端
        location /api/ {
            proxy_pass http://node_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS配置
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # WebSocket配置 - IM通讯
        location /im/ {
            proxy_pass http://nest_gateway/im/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket超时
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Python API代理
        location /python/ {
            proxy_pass http://python_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 静态资源缓存
        location ~* \.(js|css|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            proxy_pass http://vue_frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ============ React管理后台配置 ============
    server {
        listen 80;
        server_name admin.yijimall.com;

        location / {
            proxy_pass http://react_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理后台API
        location /admin-api/ {
            proxy_pass http://node_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 限流配置
            limit_req zone=admin_limit burst=20 nodelay;
        }
    }

    # ============ Nacos配置中心 ============
    server {
        listen 80;
        server_name nacos.yijimall.com;

        location / {
            proxy_pass http://nacos_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Nacos WebSocket
        location /ws/ {
            proxy_pass http://nacos_server/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ============ 静态资源服务器 ============
    server {
        listen 80;
        server_name static.yijimall.com;

        root /usr/share/nginx/html/static;
        autoindex on;

        # 图片资源
        location /images/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # CSS/JS资源
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 字体资源
        location ~* \.(woff|woff2|ttf|eot|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 上传文件
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
        }
    }

    # ============ 监控和健康检查 ============
    server {
        listen 80;
        server_name health.yijimall.com;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }

    # ============ 限流配置 ============
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;

    # ============ IP黑名单 ============
    geo $blocked {
        default 0;
        # 10.0.0.0/8 1;
        # 192.168.0.0/16 1;
    }

    map $blocked $limit {
        0 "";
        1 $binary_remote_addr;
    }
}

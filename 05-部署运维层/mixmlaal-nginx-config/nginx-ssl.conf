# ============================================
# MIXMLAAL Nginx SSL 配置
# 支持HTTPS和Let's Encrypt证书
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_names_hash_bucket_size 64;
    types_hash_max_size 2048;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # SSL配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # HTTP重定向到HTTPS
    server {
        listen 80;
        server_name laal.top www.laal.top admin.laal.top api.laal.top;
        
        # Let's Encrypt验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # Vue3 前端 (laal.top, www.laal.top)
    server {
        listen 443 ssl http2;
        server_name laal.top www.laal.top;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/laal.top.crt;
        ssl_certificate_key /etc/nginx/ssl/laal.top.key;

        # 访问日志
        access_log /var/log/nginx/frontend-access.log main;
        error_log /var/log/nginx/frontend-error.log warn;

        # 静态文件根目录
        root /usr/share/nginx/html;
        index index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA 路由处理
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # React 管理后台 (admin.laal.top)
    server {
        listen 443 ssl http2;
        server_name admin.laal.top;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/laal.top.crt;
        ssl_certificate_key /etc/nginx/ssl/laal.top.key;

        # 访问日志
        access_log /var/log/nginx/admin-access.log main;
        error_log /var/log/nginx/admin-error.log warn;

        # 静态文件根目录
        root /usr/share/nginx/admin;
        index index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA 路由处理
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Node.js 后端 API (api.laal.top)
    server {
        listen 443 ssl http2;
        server_name api.laal.top;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/laal.top.crt;
        ssl_certificate_key /etc/nginx/ssl/laal.top.key;

        # 访问日志
        access_log /var/log/nginx/api-access.log main;
        error_log /var/log/nginx/api-error.log warn;

        # API 限流
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://supermall-backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 登录接口限流
        location /auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://supermall-backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}